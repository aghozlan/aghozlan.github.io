<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzTDERohf666RJoXbhx5hK7hTxaOQa63CDFeEKiVeSL8o4u7iBZ0uVyuiFKiMDwggmU/exec';

// ── NAV ──
function goTo(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}
const snBtns=document.querySelectorAll('.sn');
window.addEventListener('scroll',()=>{
  let cur='hero';
  ['hero','explore','explain','transmission','nt','elaborate','deepthink','evaluate'].forEach(s=>{const el=document.getElementById(s);if(el&&window.scrollY>=el.offsetTop-200)cur=s;});
  snBtns.forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')?.includes("'"+cur+"'")));
});

// ── MCQ ──
var mcqSel={},correct={q1:false,q2:false,q3:false,q4:false};
const mcqAns={
  1:{c:'B',h:'Mitochondria provide ATP for the energy-demanding processes at synapses: moving vesicles by exocytosis and actively pumping neurotransmitters back during reuptake.'},
  2:{c:'B',h:'The electrical signal cannot cross the synaptic cleft. Neurotransmitters are released, diffuse across, bind receptors, and trigger a NEW electrical impulse — an electrical-chemical-electrical conversion.'},
  3:{c:'B',h:'Synapses are strictly unidirectional. Receptor proteins only exist on the postsynaptic membrane, and vesicles only in the presynaptic knob. The signal can only flow one way.'},
  4:{c:'B',h:'By blocking reuptake, dopamine accumulates in the cleft and continuously stimulates receptors — this is the mechanism behind cocaine\'s euphoric and addictive effects.'},
};
function selMCQ(q,l){
  mcqSel[q]=l;
  document.querySelectorAll('#q'+q+'opts .mcq-opt').forEach((o,i)=>{
    o.classList.toggle('selected',['A','B','C','D'][i]===l);
  });
}
function chkMCQ(q,ca){
  const fb=document.getElementById('q'+q+'fb'),sel=mcqSel[q];
  fb.style.display='block';
  if(!sel){fb.className='fb info';fb.textContent='Select an option first.';return;}
  document.querySelectorAll('#q'+q+'opts .mcq-opt').forEach((o,i)=>{
    const l=['A','B','C','D'][i];
    o.classList.remove('selected');
    if(l===ca)o.classList.add('correct');
    else if(l===sel)o.classList.add('wrong');
  });
  if(sel===ca){fb.className='fb ok';fb.textContent='✓ Correct! '+mcqAns[q].h;correct['q'+q]=true;}
  else{fb.className='fb bad';fb.textContent='✗ '+mcqAns[q].h;correct['q'+q]=false;}
  updateProg();
}
function updateProg(){
  const done=Object.values(correct).filter(Boolean).length;
  const pct=Math.round(done/4*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=done+' / 4 questions correct';
  document.getElementById('scoreDisp').textContent=pct+'%';
  document.getElementById('ansReview').innerHTML=[
    'Q1 (Mitochondria): '+(mcqSel[1]||'—')+(correct.q1?' ✓':''),
    'Q2 (Signal crossing): '+(mcqSel[2]||'—')+(correct.q2?' ✓':''),
    'Q3 (Directionality trap): '+(mcqSel[3]||'—')+(correct.q3?' ✓':''),
    'Q4 (Cocaine/dopamine): '+(mcqSel[4]||'—')+(correct.q4?' ✓':''),
  ].map(l=>'<div>'+l+'</div>').join('');
}

// ── AI TUTOR ──
function getAI(n){
  const answer=document.getElementById('open'+n).value.trim().toLowerCase();
  const resp=document.getElementById('ai'+n);
  if(!answer){showToast('Write your answer first!');return;}
  resp.style.display='block';
  resp.innerHTML='<div class="ai-thinking"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>';
  setTimeout(()=>{resp.textContent=buildBioFeedback(n,answer);},1400);
}

function buildBioFeedback(qn,a){
  if(qn===1){
    // Myasthenia gravis question
    const hasWeakness  = /weak|muscl|fatigue|paralys|cannot contract|fail/i.test(a);
    const hasACh       = /acetylcholine|ach\b|neurotransmitter/i.test(a);
    const hasReceptor  = /receptor|bind|lock|key|postsynaptic/i.test(a);
    const hasNMJ       = /neuromuscular|nmj|nerve.*muscle|muscle.*nerve/i.test(a);
    const hasMechanism = /antibod|destro|block|fewer receptor|less binding/i.test(a);
    const score=[hasWeakness,hasACh,hasReceptor,hasNMJ,hasMechanism].filter(Boolean).length;
    const rights=[];
    if(hasACh)rights.push('correctly linking the condition to acetylcholine');
    if(hasReceptor)rights.push('explaining the role of receptor proteins');
    if(hasWeakness)rights.push('predicting muscle weakness as a symptom');
    if(hasNMJ)rights.push('mentioning the neuromuscular junction');
    if(hasMechanism)rights.push('describing the antibody mechanism');
    let p1=rights.length===0?'You have made a start. Try to connect the biology more specifically.'
      :'Well done on '+rights.slice(0,-1).join(', ')+(rights.length>1?' and ':'')+rights[rights.length-1]+'.';
    const fixes=[];
    if(!hasACh)fixes.push('specify that ACh (acetylcholine) is the neurotransmitter at neuromuscular junctions');
    if(!hasReceptor)fixes.push('explain that without receptors, ACh cannot bind and no new impulse is generated in the muscle');
    if(!hasWeakness)fixes.push('state the clinical outcome: progressive muscle weakness and fatigue, especially in eye, face, and limb muscles');
    let p2=fixes.length===0?'Your mechanistic explanation is thorough — excellent biological reasoning.'
      :'To improve: '+fixes[0]+'.';
    const p3s=[
      'Myasthenia gravis treatments include acetylcholinesterase inhibitors — blocking ACh breakdown keeps more ACh in the cleft to compete for the remaining receptors. You now understand why this works!',
      'This condition beautifully illustrates the lock-and-key specificity of synapses — destroy enough locks (receptors) and the key (ACh) becomes useless, no matter how much of it is released.',
    ];
    return p1+' '+p2+' '+p3s[score%p3s.length];
  } else {
    // Alzheimer's / ACh inhibitor question
    const hasMoreACh   = /more ach|increase|accumulate|stay longer|build up/i.test(a);
    const hasBenefit   = /benefit|memory|cognition|alzheimer|improve/i.test(a);
    const hasRisk      = /risk|overstimulat|too much|side effect|constant|danger/i.test(a);
    const hasEvaluate  = /good|bad|effective|strategy|whether|overall|consider/i.test(a);
    const hasEnzyme    = /enzyme|acetylcholinesterase|breakdown|degrad/i.test(a);
    const score=[hasMoreACh,hasBenefit,hasRisk,hasEvaluate,hasEnzyme].filter(Boolean).length;
    const rights=[];
    if(hasMoreACh)rights.push('predicting that ACh accumulates in the cleft');
    if(hasBenefit)rights.push('identifying cognitive/memory benefits');
    if(hasRisk)rights.push('considering potential risks of over-stimulation');
    if(hasEvaluate)rights.push('attempting a genuine evaluation of the strategy');
    if(hasEnzyme)rights.push('naming acetylcholinesterase as the target enzyme');
    let p1=rights.length===0?'This is a challenging question — think about what happens to ACh if it cannot be broken down.'
      :'Strong thinking on '+rights.slice(0,-1).join(', ')+(rights.length>1?' and ':'')+rights[rights.length-1]+'.';
    const fixes=[];
    if(!hasMoreACh)fixes.push('start by stating the direct effect: ACh cannot be broken down, so it remains in the cleft and continues stimulating receptors');
    if(!hasRisk)fixes.push('consider the risks: if ACh cannot be cleared, the postsynaptic neurone may be over-stimulated, causing unwanted muscle contractions or excessive nerve firing');
    if(!hasEvaluate)fixes.push('conclude with a balanced evaluation: the drug may slow memory decline but must be carefully dosed to avoid dangerous side effects');
    let p2=fixes.length===0?'Your scientific evaluation shows genuine critical thinking — this is A-level reasoning.'
      :'To strengthen your answer: '+fixes[0]+'.';
    const p3s=[
      'This is exactly how the real drug donepezil works — it is an acetylcholinesterase inhibitor used to treat Alzheimer\'s. You just reasoned through the mechanism of a real medicine!',
      'The challenge with this approach is that ACh is used throughout the body, not just in the brain — so blocking its breakdown everywhere causes side effects like increased saliva, slower heart rate, and digestive issues.',
    ];
    return p1+' '+p2+' '+p3s[score%p3s.length];
  }
}

// ── SUBMIT ──
async function submitWork(){
  const name=document.getElementById('stuName').value.trim();
  const cls=document.getElementById('stuClass').value.trim();
  if(!name||!cls){showToast('⚠ Enter your name and class first!');return;}
  const btn=document.querySelector('[onclick="submitWork()"]');
  btn.disabled=true;btn.textContent='⏳ Submitting…';
  const done=Object.values(correct).filter(Boolean).length;
  const payload={
    sheet:'Synapse_Biology',
    name,class:cls,
    q1:mcqSel[1]?'Q1:'+(mcqSel[1])+(correct.q1?' ✓':' ✗'):'—',
    q2:mcqSel[2]?'Q2:'+(mcqSel[2])+(correct.q2?' ✓':' ✗'):'—',
    q3:mcqSel[3]?'Q3:'+(mcqSel[3])+(correct.q3?' ✓':' ✗'):'—',
    q4:mcqSel[4]?'Q4:'+(mcqSel[4])+(correct.q4?' ✓':' ✗'):'—',
    open1:document.getElementById('open1').value||'—',
    open2:document.getElementById('open2').value||'—',
    score:Math.round(done/4*100)+'%'
  };
  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    document.getElementById('submitOk').style.display='block';
    btn.textContent='✓ Submitted!';btn.style.background='var(--green2)';btn.style.color='#000';
    showToast('✓ Submitted to Ahmad\'s grade sheet!');
  }catch(e){
    btn.disabled=false;btn.textContent='📊 Submit to Teacher\'s Grade Sheet';
    showToast('⚠ Check internet connection.');
  }
}

// ── SHARE & TOAST ──
function shareModule(){
  const ci=document.getElementById('copyInput');
  ci.value=window.location.href;ci.select();ci.setSelectionRange(0,9999);
  try{document.execCommand('copy');}catch(e){}
  showToast('✓ Link copied!');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ══════════════════════════════════════════════════════════════
// DEEP THINKING — Critical Thinking & Creativity Chatbot
// ══════════════════════════════════════════════════════════════
const CT_QUESTIONS=[
  {n:1,bloom:'Analyse',q:'Analyse what would happen to nerve signal transmission if neurotransmitters were not removed after binding to receptors.',hint:'Think about continuous stimulation — what happens to a neuron that never resets?',model:'Continuous stimulation of the postsynaptic neuron. It could remain constantly activated, leading to uncontrolled signaling and inability to reset for new signals.'},
  {n:2,bloom:'Analyse',q:'Analyse why calcium entry is essential for neurotransmitter release.',hint:'What triggers the vesicles to fuse with the membrane? What role do ions play?',model:'Calcium ions trigger synaptic vesicles to move toward and fuse with the presynaptic membrane. Without calcium, vesicles cannot release neurotransmitters into the cleft.'},
  {n:3,bloom:'Apply',q:'A toxin prevents vesicles from fusing with the presynaptic membrane. How would this affect communication between neurons?',hint:'If vesicles cannot fuse — can neurotransmitters be released?',model:'Neurotransmitters would not be released into the cleft, so the signal would not be transmitted to the postsynaptic neuron.'},
  {n:4,bloom:'Compare',q:'Compare electrical and chemical synapses in terms of speed, direction, and flexibility.',hint:'Think about what makes electrical signals fast and what makes chemical signals versatile.',model:'Electrical: fast, often bidirectional, less flexible. Chemical: slower, usually unidirectional, allow modulation and complex signaling.'},
  {n:5,bloom:'Compare',q:'Compare signal transmission along an axon with transmission across a synapse.',hint:'What type of signal travels the axon? What type crosses the cleft?',model:'Along the axon: electrical (action potential). Across the synapse: chemical (neurotransmitters).'},
  {n:6,bloom:'Interpret',q:'Interpret why neurotransmitter concentration rises and then quickly decreases in the synaptic cleft.',hint:'Why must the signal end quickly? What structures are responsible for removal?',model:'The decrease ensures the signal ends quickly so neurons can reset and prepare for the next signal.'},
  {n:7,bloom:'Predict',q:'A drug increases the number of receptors on the postsynaptic membrane. What is the effect on signaling?',hint:'More receptors means more binding sites. How does this change sensitivity?',model:'The postsynaptic neuron becomes more sensitive to neurotransmitters, potentially strengthening the signal.'},
  {n:8,bloom:'Evaluate',q:'Evaluate the advantages and risks of drugs that block neurotransmitter receptors.',hint:'Think of both therapeutic uses and what normal signaling loses when receptors are blocked.',model:'Benefits: treat disorders like anxiety or pain. Risks: disrupting normal brain communication, dependency, side effects.'},
  {n:9,bloom:'Evaluate',q:'Evaluate why the nervous system uses chemical synapses instead of only electrical ones.',hint:'What can chemical synapses do that electrical synapses cannot?',model:'Chemical synapses allow signal amplification, modulation, integration of multiple inputs, and learning processes.'},
  {n:10,bloom:'Apply',q:'Relate the role of the synapse in the reflex of withdrawing a hand from a hot object.',hint:'Trace the signal: pain receptor → sensory neuron → ? → motor neuron → muscle.',model:'Sensory neurons transmit signals to interneurons through synapses, which transmit to motor neurons causing muscle contraction and hand withdrawal.'},
  {n:11,bloom:'Predict',q:'Predict what happens if enzymes that break down neurotransmitters in the cleft become inactive.',hint:'If neurotransmitters are not removed — what happens to the duration of stimulation?',model:'Neurotransmitters remain longer in the cleft, causing prolonged stimulation and possibly continuous muscle contraction.'},
  {n:12,bloom:'Predict',q:'A toxin blocks calcium channels in the presynaptic neuron. Predict the effect on synaptic transmission.',hint:'Calcium is needed for what process exactly? Without it — what cannot happen?',model:'Without calcium entry, neurotransmitter release will not occur and synaptic transmission will stop.'},
];

const CR_QUESTIONS=[
  {n:1,type:'Imagine',q:'Imagine that synapses did not exist in the nervous system. How would nerve cells communicate? Propose an alternative biological mechanism.',hint:'Consider what exists in some simple organisms — direct ion flow between cells, or hormonal signaling.',model:'Neurons might use direct electrical connections (gap junctions) where ion flow passes between cells. Or chemical signals into body fluids. Synapses allow precise, controlled communication.'},
  {n:2,type:'Design',q:'Design a new type of synapse that transmits signals faster than the normal chemical synapse. Describe its structure and explain how it works.',hint:'What makes chemical synapses slow? What would remove that delay?',model:'A faster synapse could use electrical transmission through channels connecting two neurons directly, allowing ions to pass without neurotransmitter release, eliminating the chemical delay.'},
  {n:3,type:'Compare',q:'Compare the synapse to a system in daily life (e.g. email, traffic lights, postal services). Explain the similarities clearly.',hint:'Identify sender, message, medium, receiver — where are these in a synapse?',model:'Like an email: presynaptic neuron = sender, neurotransmitter = message, cleft = transmission medium, receptor = inbox. Both involve sending, transmitting, and receiving with specificity.'},
  {n:4,type:'Create',q:'If neurotransmitters had different colours based on function, what colours would you assign to excitatory and inhibitory ones? Justify your reasoning.',hint:'Think about what each type does — activate or suppress. What colour associations fit?',model:'Excitatory = bright/warm (red, orange, yellow) — stimulate activity. Inhibitory = cool/calm (blue, green) — reduce activity. Reasoning matters more than colour choice.'},
  {n:5,type:'Predict',q:'Suppose a scientist discovers a drug that blocks neurotransmitter reuptake at the synapse. Predict the effect on nerve impulse transmission.',hint:'If reuptake is blocked, where do neurotransmitters stay? For how long?',model:'Blocking reuptake causes neurotransmitters to remain longer in the cleft, prolonging or strengthening stimulation of the postsynaptic neuron.'},
  {n:6,type:'Analogy',q:'Create a short analogy or story explaining how a synapse works to a younger student (age 8–9). Make it vivid and accurate.',hint:'Think of throwing and catching a ball, or sending letters. Keep the biology correct!',model:'Example: a neuron is like a person throwing a ball (neurotransmitter) across a space (cleft) to another person who catches it (receptor) and can pass it on.'},
  {n:7,type:'Imagine',q:'Imagine that synaptic transmission becomes slower in a person. What effects might this have on behaviour, movement, and learning?',hint:'Think reflexes, coordination, reaction time, and memory formation.',model:'Slower reflexes, delayed reactions, difficulty coordinating movements, slower learning — because messages travel more slowly between neurons.'},
  {n:8,type:'Observe',q:'If you could observe a synapse in real-time with a microscope, describe step-by-step what you would expect to see from nerve impulse arrival to the next neuron firing.',hint:'Think about what is visible at each stage — vesicle movement, diffusion, receptor changes.',model:'Arrival of impulse at presynaptic terminal → vesicle movement and fusion → neurotransmitter diffusion across cleft → binding to receptors → new electrical signal generated.'},
  {n:9,type:'Invent',q:'Propose one technological invention inspired by synapses that could improve communication between computers or robots.',hint:'How does synaptic plasticity relate to machine learning? Could artificial synapses improve AI?',model:'Neuromorphic computing uses artificial synapses for computers to exchange signals like neurons, allowing adaptive, efficient learning in machines.'},
  {n:10,type:'Experiment',q:'Some synapses strengthen with repeated learning (synaptic plasticity). Design an experiment that could demonstrate how repeated stimulation affects synaptic strength.',hint:'What would you measure? What would you stimulate repeatedly? What would you control?',model:'Repeatedly stimulate a presynaptic neuron at set intervals and measure the postsynaptic response amplitude. If the response grows stronger over trials, the synapse has strengthened.'},
];

// Chat history per question: { CT_1: [{role,text},...], CR_3: [...] }
const chatHistories={};

function getHistKey(cat,n){return cat+'_'+n;}

function switchTab(tab){
  document.getElementById('panelCT').style.display=tab==='CT'?'block':'none';
  document.getElementById('panelCR').style.display=tab==='CR'?'block':'none';
  document.getElementById('tabCT').classList.toggle('active',tab==='CT');
  document.getElementById('tabCR').classList.toggle('active',tab==='CR');
}

function buildQBlocks(questions,containerId,cat){
  const container=document.getElementById(containerId);
  if(!container)return;
  const bloomColors={Analyse:'#22d3ee',Compare:'#f472b6',Apply:'#00ff88',
    Interpret:'#f59e0b',Predict:'#f87171',Evaluate:'#8b5cf6',
    Imagine:'#8b5cf6',Design:'#22d3ee',Create:'#f472b6',Analogy:'#f59e0b',
    Observe:'#00ff88',Invent:'#f87171',Experiment:'#06b6d4'};

  questions.forEach(q=>{
    const key=getHistKey(cat,q.n);
    chatHistories[key]=[];
    const col=bloomColors[q.bloom||q.type]||'#8b5cf6';
    const div=document.createElement('div');
    div.className='dt-qblock';
    div.innerHTML=`
      <div class="dt-header" onclick="toggleQ('body_${key}','chev_${key}')">
        <div class="dt-num" style="background:${col}22;color:${col};border:1.5px solid ${col}44;">${q.n}</div>
        <div style="flex:1;">
          <div style="font-size:.6rem;color:${col};font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;">${q.bloom||q.type}</div>
          <div class="dt-qtext">${q.q}</div>
        </div>
        <div class="dt-chevron" id="chev_${key}">▾</div>
      </div>
      <div class="dt-body" id="body_${key}">
        <div style="font-size:.76rem;color:var(--muted2);margin-bottom:10px;padding:8px 12px;background:var(--panel2);border-radius:7px;border-left:3px solid ${col};">
          💡 <em>Hint:</em> ${q.hint}
        </div>
        <div class="chat-history" id="chat_${key}"></div>
        <textarea class="dt-input" id="inp_${key}" placeholder="Write your thinking here. Use biological terminology. The AI tutor will guide you further…"></textarea>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <button class="dt-send" id="btn_${key}" onclick="sendChat('${cat}',${q.n})">Send →</button>
          <span style="font-size:.68rem;color:var(--muted);" id="status_${key}"></span>
        </div>
      </div>`;
    container.appendChild(div);
  });
}

function toggleQ(bodyId,chevId){
  const body=document.getElementById(bodyId);
  const chev=document.getElementById(chevId);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

async function sendChat(cat,n){
  const key=getHistKey(cat,n);
  const inp=document.getElementById('inp_'+key);
  const btn=document.getElementById('btn_'+key);
  const status=document.getElementById('status_'+key);
  const chatEl=document.getElementById('chat_'+key);
  const text=inp.value.trim();
  if(!text){inp.focus();return;}

  const qs=cat==='CT'?CT_QUESTIONS:CR_QUESTIONS;
  const qObj=qs.find(q=>q.n===n);

  // Add user message
  chatHistories[key].push({role:'user',content:text});
  appendMsg(chatEl,'user',text);
  inp.value='';
  btn.disabled=true;
  status.textContent='AI tutor is thinking…';

  // Show typing indicator
  const typing=document.createElement('div');
  typing.className='chat-msg ai chat-typing';
  typing.innerHTML='<div class="chat-dot"></div><div class="chat-dot"></div><div class="chat-dot"></div>';
  chatEl.appendChild(typing);
  chatEl.scrollTop=chatEl.scrollHeight;

  // Build system prompt
  const systemPrompt=`You are a Socratic biology tutor for Grade 10 students studying the nervous system and synapses.
The student is answering this question: "${qObj.q}"
A model answer (for your reference only — DO NOT give it to the student directly): "${qObj.model}"
Your job:
1. Acknowledge what the student got RIGHT first, specifically.
2. Ask ONE focused follow-up question or point to ONE gap in their reasoning.
3. If their answer is complete and accurate, praise it specifically and offer one extension thought.
4. Never copy the model answer word-for-word. Guide them to discover it.
5. Keep responses concise — 2–4 sentences max.
6. Use biological vocabulary naturally (synapse, vesicle, receptor, action potential, etc.)
7. Be warm, encouraging, and intellectually curious.`;

  // Build message array (keep last 6 exchanges for context)
  const history=chatHistories[key].slice(-6);
  const messages=history.map(h=>({role:h.role,content:h.content}));

  try{
    // Route through Apps Script proxy
    const resp=await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // CORS fix applied here
      body:JSON.stringify({
        action:'claude',
        system:systemPrompt,
        messages:messages
      })
    });
    const data=await resp.json();
    const aiText=data.text||data.error||'Could not get a response. Please try again.';
    chatHistories[key].push({role:'assistant',content:aiText});
    chatEl.removeChild(typing);
    appendMsg(chatEl,'ai',aiText);
  }catch(e){
    chatEl.removeChild(typing);
    appendMsg(chatEl,'ai','⚠ Could not connect to AI tutor. Check internet connection and try again.');
  }

  btn.disabled=false;
  status.textContent='';
  chatEl.scrollTop=chatEl.scrollHeight;
}

function appendMsg(chatEl,role,text){
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  // Convert **bold** to <strong>
  div.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  chatEl.appendChild(div);
  chatEl.scrollTop=chatEl.scrollHeight;
}

// Build on load
window.addEventListener('load',()=>{
  buildQBlocks(CT_QUESTIONS,'ctQuestions','CT');
  buildQBlocks(CR_QUESTIONS,'crQuestions','CR');
});

</script>
