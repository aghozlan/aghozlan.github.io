<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave3D Review — Wave Characteristics | Ahmad Ghozlan | Grade 8</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#010d12;font-family:'Outfit',sans-serif;color:#c8eef0;}
#c{position:fixed;inset:0;z-index:1;}
.ov{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px 20px;}
.top{display:flex;align-items:flex-start;justify-content:space-between;pointer-events:all;}
.tag{font-family:'DM Mono',monospace;font-size:.54rem;color:#00e5cc;text-transform:uppercase;letter-spacing:3px;border:1px solid rgba(0,229,204,.2);padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:5px;}
.nm{font-size:.98rem;font-weight:800;color:#fff;}
.nm span{color:#00e5cc;}
.tbtn{padding:6px 14px;border-radius:5px;border:1px solid rgba(0,229,204,.25);background:rgba(1,13,18,.88);color:#c8eef0;font-family:'Outfit',sans-serif;font-weight:600;font-size:.72rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);}
.tbtn:hover{border-color:#00e5cc;color:#00e5cc;}
.tbtn.on{background:#00e5cc;color:#000;border-color:#00e5cc;}
.ctr{text-align:center;pointer-events:none;}
.sn{font-family:'DM Mono',monospace;font-size:.54rem;color:#00e5cc;text-transform:uppercase;letter-spacing:3px;margin-bottom:5px;opacity:0;transition:opacity .4s;}
.st{font-size:clamp(.95rem,2.2vw,1.4rem);font-weight:800;color:#fff;text-shadow:0 2px 24px #000;opacity:0;transition:opacity .4s;max-width:600px;margin:0 auto;line-height:1.3;}
.ss{font-size:.76rem;color:#5a9a9e;margin-top:5px;opacity:0;transition:opacity .4s;font-style:italic;}
.bot{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.inf{background:rgba(1,13,18,.92);border:1px solid rgba(0,229,204,.2);border-radius:10px;padding:12px 16px;backdrop-filter:blur(12px);flex:1;min-width:180px;max-width:380px;}
.ilbl{font-family:'DM Mono',monospace;font-size:.54rem;color:#00e5cc;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.itl{font-weight:700;font-size:.86rem;color:#fff;margin-bottom:4px;}
.itx{font-size:.73rem;color:#5a9a9e;line-height:1.65;}
.itx strong{color:#c8eef0;}
.formula-box{background:rgba(0,229,204,.07);border:1px solid rgba(0,229,204,.25);border-radius:8px;padding:9px 14px;margin-top:8px;font-family:'DM Mono',monospace;font-size:.9rem;color:#00e5cc;text-align:center;}
.formula-box .unit{font-size:.65rem;color:#5a9a9e;margin-top:3px;}
.leg{background:rgba(1,13,18,.92);border:1px solid rgba(0,229,204,.15);border-radius:10px;padding:10px 13px;backdrop-filter:blur(12px);flex-shrink:0;}
.ltl{font-family:'DM Mono',monospace;font-size:.5rem;color:#5a9a9e;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.li{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:.7rem;color:#5a9a9e;}
.ld{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.li strong{color:#c8eef0;}
.stps{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap;}
.dots{display:flex;gap:5px;flex-wrap:wrap;}
.dot{width:7px;height:7px;border-radius:50%;background:#1a3a40;transition:all .3s;cursor:pointer;}
.dot.cur{background:#00e5cc;transform:scale(1.4);}
.dot.done{background:#0088aa;}
#ld{position:fixed;inset:0;z-index:100;background:#010d12;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;}
#ld.h{opacity:0;pointer-events:none;}
#ld .lt{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:6px;}
#ld .lt span{color:#00e5cc;}
#ld .ls{font-size:.76rem;color:#5a9a9e;margin-bottom:22px;}
#ld .lb{width:180px;height:3px;background:#0d2228;border-radius:2px;overflow:hidden;}
#ld .lf{height:100%;background:linear-gradient(90deg,#006688,#00e5cc);width:0%;transition:width .3s;border-radius:2px;}
@media(max-width:600px){.bot{flex-direction:column;}.inf,.leg{width:100%;max-width:100%;}}
</style>
</head>
<body>
<div id="ld"><div class="lt">Wave<span>Lab</span> 3D</div><div class="ls">Building 3D wave model...</div><div class="lb"><div class="lf" id="lf"></div></div></div>
<canvas id="c"></canvas>
<div class="ov">
  <div class="top">
    <div><div class="tag">Grade 8 · Physics · Wave Review</div><div class="nm">Wave<span>Lab</span> 3D — Review</div></div>
    <div style="display:flex;gap:7px;">
      <button class="tbtn on" id="aBtn" onclick="toggleAuto()">▶ Auto</button>
      <button class="tbtn on" id="oBtn" onclick="toggleOrb()">🔄 Orbit</button>
      <button class="tbtn" onclick="location.href='waveassessment.html'" style="background:rgba(0,229,204,.15);border-color:rgba(0,229,204,.4);color:#00e5cc;">📝 Start Assessment</button>
      <button class="tbtn" onclick="location.href='wavelab3.html'">← WaveLab 2</button>
    </div>
  </div>
  <div class="ctr">
    <div class="sn" id="sn"></div>
    <div class="st" id="st"></div>
    <div class="ss" id="ss"></div>
  </div>
  <div class="bot">
    <div class="inf">
      <div class="ilbl" id="il"></div>
      <div class="itl" id="it"></div>
      <div class="itx" id="ix"></div>
      <div class="formula-box" id="fb" style="display:none;"><div id="fmain"></div><div class="unit" id="funit"></div></div>
    </div>
    <div class="leg">
      <div class="ltl">Colour Key</div>
      <div class="li"><div class="ld" style="background:#00e5cc;"></div><strong>Wave</strong> — teal string</div>
      <div class="li"><div class="ld" style="background:#ff6600;"></div><strong>Amplitude A</strong> — orange</div>
      <div class="li"><div class="ld" style="background:#ffdd00;"></div><strong>Wavelength λ</strong> — yellow</div>
      <div class="li"><div class="ld" style="background:#ff44aa;"></div><strong>Particle motion</strong> — pink</div>
      <div class="li"><div class="ld" style="background:#88ff44;"></div><strong>Wave direction</strong> — green</div>
      <div class="li"><div class="ld" style="background:#aa66ff;"></div><strong>Period / Speed</strong> — violet</div>
    </div>
    <div class="stps">
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SC=[
{n:'Scene 1 of 7',t:'The Transverse Wave',s:'Particles vibrate perpendicular to the wave direction',
 l:'Wave Type',ti:'Transverse Wave',
 tx:'A <strong>transverse wave</strong> — particles of the medium vibrate <strong>up and down</strong> (perpendicular ⊥) while the wave energy travels <strong>horizontally</strong>. Examples: light, water ripples, string waves.',
 fm:'Particle motion ⊥ Wave direction',fu:'perpendicular = 90°',cam:{r:16,phi:1.25,th:0.4}},
{n:'Scene 2 of 7',t:'Amplitude (A)',s:'Maximum displacement from equilibrium position',
 l:'Quantity: Amplitude',ti:'Amplitude A',
 tx:'<strong>Amplitude A</strong> is the maximum displacement of a particle from its rest (equilibrium) position. Larger amplitude = more energy in the wave. Amplitude does <em>not</em> affect wave speed or wavelength.',
 fm:'A = maximum displacement',fu:'Unit: metre (m)',cam:{r:12,phi:1.4,th:0.6}},
{n:'Scene 3 of 7',t:'Wavelength (λ)',s:'Distance between two consecutive identical points',
 l:'Quantity: Wavelength',ti:'Wavelength λ (lambda)',
 tx:'<strong>Wavelength λ</strong> is the distance between two consecutive points in phase — crest to crest, or trough to trough. It is measured along the direction of wave propagation.',
 fm:'λ = crest-to-crest distance',fu:'Unit: metre (m)',cam:{r:14,phi:1.3,th:0.2}},
{n:'Scene 4 of 7',t:'Period (T)',s:'Time for one complete oscillation of a particle',
 l:'Quantity: Period',ti:'Period T',
 tx:'<strong>Period T</strong> is the time for one complete oscillation — a particle goes up, reaches the crest, comes down, reaches the trough, and returns to the starting position. One full cycle.',
 fm:'T = time for 1 complete oscillation',fu:'Unit: second (s)',cam:{r:13,phi:1.35,th:-0.3}},
{n:'Scene 5 of 7',t:'Frequency (f)',s:'Number of complete oscillations per second',
 l:'Quantity: Frequency',ti:'Frequency f',
 tx:'<strong>Frequency f</strong> is the number of complete oscillations (cycles) per second. Higher frequency = more waves per second = shorter wavelength (speed constant). Frequency and period are inverses of each other.',
 fm:'f = 1/T',fu:'Unit: hertz (Hz) = s⁻¹',cam:{r:13,phi:1.35,th:0.5}},
{n:'Scene 6 of 7',t:'Wave Speed (v)',s:'Distance travelled by the wave per second',
 l:'Quantity: Wave Speed',ti:'Wave Speed v',
 tx:'<strong>Wave speed v</strong> is the distance travelled by the wave (not particles) per second. Speed depends on the <em>medium</em>, not on frequency or amplitude. In the same medium, v is always constant.',
 fm:'v = f × λ',fu:'Unit: metre per second (m/s)',cam:{r:15,phi:1.2,th:0.1}},
{n:'Scene 7 of 7',t:'All Formulas Together',s:'The complete wave equation toolkit',
 l:'Summary',ti:'All Wave Formulas',
 tx:'<strong>The four key relations:</strong> f = 1/T (frequency from period) · T = 1/f (period from frequency) · v = fλ (wave speed) · λ = v/f (wavelength from speed and frequency). Master these and you can find any wave quantity.',
 fm:'v = fλ   f = 1/T   T = 1/f   λ = v/f',fu:'v: m/s · f: Hz · T: s · λ: m · A: m',cam:{r:18,phi:1.15,th:0.3}}
];

const R=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010d12);
scene.fog=new THREE.FogExp2(0x010d12,0.025);

const cam=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,300);
cam.position.set(0,2,16);

scene.add(new THREE.AmbientLight(0x0a2228,5));
const kl=new THREE.PointLight(0x00ccaa,8,50);kl.position.set(0,8,5);scene.add(kl);
const fl=new THREE.PointLight(0x0044aa,5,40);fl.position.set(-12,-4,8);scene.add(fl);
const rl=new THREE.PointLight(0xff6600,3,30);rl.position.set(10,2,-5);scene.add(rl);

function mg(col,ei=1.0){return new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:ei,roughness:0.1,metalness:0.1,transparent:true,opacity:0.9});}
function ms(col,emi,op=1,tr=false){return new THREE.MeshStandardMaterial({color:col,emissive:emi,emissiveIntensity:0.4,roughness:0.4,metalness:0.1,transparent:tr,opacity:op});}

// Wave parameters
const WAVE_LEN=20,N_POINTS=120,AMP=1.8,WAVE_K=Math.PI*2/6,OMEGA=Math.PI*2*0.6;
const WAVE_COLOR=0x00e5cc,AMP_COLOR=0xff6600,LAM_COLOR=0xffdd00;
const PART_COLOR=0xff44aa,DIR_COLOR=0x88ff44,SPEED_COLOR=0xaa66ff;

// Build wave as tube following sine curve
const wavePts=[];
for(let i=0;i<=N_POINTS;i++){
  const x=(i/N_POINTS)*WAVE_LEN-WAVE_LEN/2;
  wavePts.push(new THREE.Vector3(x,0,0));
}
const waveCurve=new THREE.CatmullRomCurve3(wavePts);
const waveTubeGeo=new THREE.TubeGeometry(waveCurve,N_POINTS,0.06,8,false);
const waveMesh=new THREE.Mesh(waveTubeGeo,mg(WAVE_COLOR,1.4));
scene.add(waveMesh);

// Equilibrium line (dashed look — thin box)
const eqMesh=new THREE.Mesh(new THREE.BoxGeometry(WAVE_LEN,0.03,0.03),ms(0x1a5555,0x00e5cc,0.4,true));
scene.add(eqMesh);

// Amplitude arrow (orange vertical line)
const ampGrp=new THREE.Group();scene.add(ampGrp);ampGrp.visible=false;
const ampLine=new THREE.Mesh(new THREE.BoxGeometry(0.08,AMP,0.08),mg(AMP_COLOR,2.0));
ampLine.position.set(0,AMP/2,0);ampGrp.add(ampLine);
// Arrowheads
[AMP,-0].forEach(y=>{
  const tip=new THREE.Mesh(new THREE.ConeGeometry(0.18,0.4,8),mg(AMP_COLOR,2));
  tip.position.set(0,y>0?AMP+0.2:-0.2,0);if(y<=0)tip.rotation.z=Math.PI;
  ampGrp.add(tip);
});
// Label plane
const ampLblGeo=new THREE.PlaneGeometry(1.5,0.5);
const ampLblMat=new THREE.MeshBasicMaterial({color:AMP_COLOR,transparent:true,opacity:0});
const ampLbl=new THREE.Mesh(ampLblGeo,ampLblMat);ampLbl.position.set(1.2,AMP/2,0);ampGrp.add(ampLbl);

// Wavelength arrow (yellow horizontal)
const lamGrp=new THREE.Group();scene.add(lamGrp);lamGrp.visible=false;
const lamLine=new THREE.Mesh(new THREE.BoxGeometry(6,0.08,0.08),mg(LAM_COLOR,2.0));
lamLine.position.set(-WAVE_LEN/2+3+6/2,AMP+0.5,0);lamGrp.add(lamLine);
[0,6].forEach(x=>{
  const tip=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.35,8),mg(LAM_COLOR,2));
  tip.rotation.z=x===0?Math.PI/2:-Math.PI/2;
  tip.position.set(-WAVE_LEN/2+3+x,AMP+0.5,0);lamGrp.add(tip);
});

// Particle (pink sphere that oscillates)
const particleMesh=new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12),mg(PART_COLOR,1.5));
particleMesh.position.set(0,0,0);scene.add(particleMesh);particleMesh.visible=false;

// Wave direction arrow (green)
const dirArrowGrp=new THREE.Group();scene.add(dirArrowGrp);dirArrowGrp.visible=false;
const dirShaft=new THREE.Mesh(new THREE.BoxGeometry(4,0.1,0.1),mg(DIR_COLOR,1.8));
dirShaft.position.set(4,0,0);dirArrowGrp.add(dirShaft);
const dirTip=new THREE.Mesh(new THREE.ConeGeometry(0.2,0.5,8),mg(DIR_COLOR,1.8));
dirTip.rotation.z=-Math.PI/2;dirTip.position.set(6.3,0,0);dirArrowGrp.add(dirTip);

// Speed crest tracker (violet)
const crestMarker=new THREE.Mesh(new THREE.SphereGeometry(0.3,12,12),mg(SPEED_COLOR,2.0));
scene.add(crestMarker);crestMarker.visible=false;
const crestTrail=[];
for(let i=0;i<12;i++){
  const tr=new THREE.Mesh(new THREE.SphereGeometry(0.1*(1-i/12),6,6),mg(SPEED_COLOR,0.8*(1-i/12)));
  scene.add(tr);tr.visible=false;crestTrail.push(tr);
}

// Period indicator ring
const periodRing=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.06,8,32),mg(SPEED_COLOR,1.5));
periodRing.rotation.x=Math.PI/2;scene.add(periodRing);periodRing.visible=false;

// Background particles (ocean deep feel)
const bgGeo=new THREE.BufferGeometry();
const bgPos=[];
for(let i=0;i<800;i++)bgPos.push((Math.random()-.5)*120,(Math.random()-.5)*80,(Math.random()-.5)*100);
bgGeo.setAttribute('position',new THREE.Float32BufferAttribute(bgPos,3));
scene.add(new THREE.Points(bgGeo,new THREE.PointsMaterial({color:0x003344,size:0.06})));

// Orbit
let theta=0.4,phi=1.25,radius=16;
let orbOn=true,drag=false,lx=0,ly=0;
const cv=document.getElementById('c');
cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
document.addEventListener('mousemove',e=>{if(!drag||!orbOn)return;theta-=(e.clientX-lx)*0.005;phi=Math.max(0.2,Math.min(Math.PI-.2,phi+(e.clientY-ly)*0.005));lx=e.clientX;ly=e.clientY;});
document.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('wheel',e=>{radius=Math.max(5,Math.min(30,radius+e.deltaY*0.02));},{passive:true});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{if(!drag)return;theta-=(e.touches[0].clientX-lx)*0.005;phi=Math.max(0.2,Math.min(Math.PI-.2,phi+(e.touches[0].clientY-ly)*0.005));lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',()=>drag=false);
function toggleOrb(){orbOn=!orbOn;document.getElementById('oBtn').classList.toggle('on',orbOn);}

let cur=0,autoOn=true,autoTmr=null;
const dotsEl=document.getElementById('dots');
SC.forEach((_,i)=>{
  const d=document.createElement('div');d.className='dot'+(i===0?' cur':'');
  d.onclick=()=>goScene(i);dotsEl.appendChild(d);
});

function showUI(){
  const s=SC[cur];
  ['sn','st','ss'].forEach(id=>document.getElementById(id).style.opacity=0);
  setTimeout(()=>{
    document.getElementById('sn').textContent=s.n;
    document.getElementById('st').textContent=s.t;
    document.getElementById('ss').textContent=s.s;
    document.getElementById('il').textContent=s.l;
    document.getElementById('it').textContent=s.ti;
    document.getElementById('ix').innerHTML=s.tx;
    document.getElementById('fmain').textContent=s.fm;
    document.getElementById('funit').textContent=s.fu;
    document.getElementById('fb').style.display='block';
    ['sn','st','ss'].forEach(id=>document.getElementById(id).style.opacity=1);
  },280);
  document.querySelectorAll('.dot').forEach((d,i)=>{d.classList.toggle('cur',i===cur);d.classList.toggle('done',i<cur);});
  const c=SC[cur].cam;theta=c.th;phi=c.phi;radius=c.r;
  // Show/hide elements per scene
  ampGrp.visible=cur===1||cur===6;
  lamGrp.visible=cur===2||cur===6;
  particleMesh.visible=cur===0||cur===3||cur===4;
  dirArrowGrp.visible=cur===0||cur===5||cur===6;
  crestMarker.visible=cur===5||cur===6;
  crestTrail.forEach(t=>t.visible=cur===5||cur===6);
  periodRing.visible=cur===3||cur===4;
}

function goScene(n){cur=n;showUI();}
function next(){if(cur<SC.length-1){cur++;showUI();}else{cur=0;showUI();}}
function toggleAuto(){autoOn=!autoOn;document.getElementById('aBtn').textContent=autoOn?'⏸ Pause':'▶ Auto';document.getElementById('aBtn').classList.toggle('on',autoOn);clearTimeout(autoTmr);if(autoOn)schedAuto();}
function schedAuto(){if(!autoOn)return;autoTmr=setTimeout(()=>{next();schedAuto();},7000);}

const clock=new THREE.Clock();let t=0;

function updateWave(t){
  // Rebuild wave tube each frame
  const pts=[];
  for(let i=0;i<=N_POINTS;i++){
    const x=(i/N_POINTS)*WAVE_LEN-WAVE_LEN/2;
    const y=AMP*Math.sin(WAVE_K*x-OMEGA*t);
    pts.push(new THREE.Vector3(x,y,0));
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const geo=new THREE.TubeGeometry(curve,N_POINTS,0.06,8,false);
  waveMesh.geometry.dispose();waveMesh.geometry=geo;
  return pts;
}

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();t+=dt;

  if(orbOn&&!drag)theta+=0.0018;
  const cx=radius*Math.sin(phi)*Math.sin(theta);
  const cy=radius*Math.cos(phi);
  const cz=radius*Math.sin(phi)*Math.cos(theta);
  cam.position.lerp(new THREE.Vector3(cx,cy,cz),0.055);
  cam.lookAt(0,0,0);

  kl.intensity=7+Math.sin(t*1.1)*2;
  kl.position.x=Math.sin(t*0.3)*5;

  const pts=updateWave(t);

  // Particle oscillation
  if(particleMesh.visible){
    const midPt=pts[Math.floor(N_POINTS/2)];
    particleMesh.position.set(midPt.x,midPt.y,0);
    particleMesh.material.emissiveIntensity=1.2+Math.sin(t*4)*0.4;
  }

  // Amplitude arrow pulsate
  if(ampGrp.visible){
    ampGrp.children.forEach(c=>{if(c.material)c.material.emissiveIntensity=1.8+Math.sin(t*2)*0.4;});
  }

  // Wavelength arrow
  if(lamGrp.visible){
    lamGrp.children.forEach(c=>{if(c.material)c.material.emissiveIntensity=1.8+Math.sin(t*2.2)*0.4;});
  }

  // Crest tracker for wave speed
  if(crestMarker.visible){
    const crestX=-WAVE_LEN/2+((t*2.5)%(WAVE_LEN));
    const crestXWrap=crestX>WAVE_LEN/2?crestX-WAVE_LEN:crestX;
    const crestY=AMP*Math.sin(WAVE_K*crestXWrap-OMEGA*t);
    crestMarker.position.set(crestXWrap,crestY,0);
    crestMarker.material.emissiveIntensity=1.5+Math.sin(t*6)*0.5;
    crestTrail.forEach((tr,i)=>{
      const trailX=crestXWrap-(i+1)*0.35;
      const trailY=AMP*Math.sin(WAVE_K*trailX-OMEGA*(t-i*0.04));
      tr.position.set(trailX,trailY,0);tr.visible=true;
    });
  }

  // Period ring
  if(periodRing.visible){
    const midPt=pts[Math.floor(N_POINTS/2)];
    periodRing.position.set(midPt.x,midPt.y,0);
    periodRing.scale.set(1+Math.abs(midPt.y)/AMP*0.3,1+Math.abs(midPt.y)/AMP*0.3,1);
    periodRing.material.emissiveIntensity=1.2+Math.sin(t*3)*0.5;
  }

  R.render(scene,cam);
}

window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});

let lp=0;
const li=setInterval(()=>{lp+=Math.random()*20;document.getElementById('lf').style.width=Math.min(lp,88)+'%';},80);
setTimeout(()=>{clearInterval(li);document.getElementById('lf').style.width='100%';
  setTimeout(()=>{document.getElementById('ld').classList.add('h');showUI();animate();if(autoOn)schedAuto();},350);
},1000);
</script>
</body>
</html>
