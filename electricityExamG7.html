<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Electricity Exam | Grade 7D | Ahmad Ghozlan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f9f8f5;--bg2:#f2f0eb;--bg3:#e8e5de;
  --panel:#fff;--panel2:#f5f3ee;
  --border:#ddd9d0;--border2:#c9c4b8;
  --ink:#141210;--muted:#6a6358;--muted2:#9c9485;
  --blue:#1d4ed8;--blueL:rgba(29,78,216,.07);--blueB:rgba(29,78,216,.22);
  --green:#15803d;--greenL:rgba(21,128,61,.07);
  --red:#b91c1c;--redL:rgba(185,28,28,.07);
  --amber:#b45309;--amberL:rgba(180,83,9,.08);
  --purple:#7c3aed;--purpleL:rgba(124,58,237,.07);
  --fh:'Syne',sans-serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--fb);line-height:1.65;}

/* HEADER */
.exam-header{background:var(--ink);color:#fff;display:none;}
.hdr-top{padding:16px 24px 12px;display:flex;align-items:flex-start;
  justify-content:space-between;flex-wrap:wrap;gap:10px;}
.school{font-family:var(--fm);font-size:.53rem;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:3px;margin-bottom:5px;}
.exam-name{font-family:var(--fh);font-size:1.4rem;font-weight:800;color:#fff;}
.ver-badge{background:var(--amber);color:#fff;font-family:var(--fh);
  font-size:.68rem;letter-spacing:2px;padding:5px 13px;border-radius:3px;}
.hdr-meta{padding:8px 24px;border-top:1px solid rgba(255,255,255,.09);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.meta-item{font-family:var(--fm);font-size:.57rem;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:1.5px;}
.meta-item strong{color:rgba(255,255,255,.82);}
.timer{font-family:var(--fh);font-size:1.25rem;color:#fff;letter-spacing:3px;}
.timer.warn{color:#fbbf24;}
.timer.urgent{color:#f87171;animation:tp .7s infinite;}
@keyframes tp{0%,100%{opacity:1;}50%{opacity:.4;}}

/* SELECTOR */
.selector{background:var(--bg2);border-bottom:2px solid var(--border);padding:24px;}
.sel-h{font-family:var(--fh);font-size:1.1rem;font-weight:800;margin-bottom:16px;}
select{background:var(--panel);border:1.5px solid var(--border2);border-radius:4px;
  padding:11px 14px;color:var(--ink);font-family:var(--fb);font-size:.92rem;
  outline:none;width:100%;max-width:460px;cursor:pointer;min-height:46px;
  transition:border-color .2s;display:block;margin-bottom:12px;}
select:focus{border-color:var(--blue);}
.start-btn{padding:12px 32px;background:var(--blue);color:#fff;border:none;
  border-radius:4px;font-family:var(--fh);font-size:.95rem;letter-spacing:.5px;
  cursor:pointer;min-height:44px;transition:all .2s;}
.start-btn:disabled{opacity:.38;cursor:not-allowed;}

/* BODY */
.exam-body{display:none;max-width:800px;margin:0 auto;padding:22px 18px 44px;}
.stu-bar{background:var(--blueL);border:1px solid var(--blueB);border-radius:4px;
  padding:10px 16px;margin-bottom:18px;display:flex;justify-content:space-between;
  flex-wrap:wrap;gap:8px;font-family:var(--fm);font-size:.7rem;color:var(--blue);}

/* QUESTION BLOCKS */
.qb{background:var(--panel);border:1.5px solid var(--border);border-radius:6px;
  padding:20px;margin-bottom:16px;}
.q-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.q-dot{width:30px;height:30px;border-radius:50%;color:#fff;font-family:var(--fh);
  font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-meta{font-family:var(--fm);font-size:.55rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1.5px;}
.q-instruct{font-size:.9rem;color:var(--ink);line-height:1.8;margin-bottom:14px;}
.q-instruct strong{font-weight:700;}
.q-note{font-family:var(--fm);font-size:.66rem;color:var(--muted2);
  background:var(--bg3);border:1px solid var(--border);border-radius:3px;
  padding:5px 10px;margin-bottom:10px;display:inline-block;}

/* FILL BLANK */
.blank-row{background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  padding:12px 16px;margin-bottom:9px;}
.blank-num{font-family:var(--fm);font-size:.57rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.blank-sent{font-size:.9rem;color:var(--ink);line-height:1.9;margin-bottom:8px;}
.blank-sent .gap{color:var(--blue);border-bottom:2px solid var(--blue);
  display:inline-block;min-width:80px;text-align:center;font-family:var(--fm);
  font-size:.76rem;padding:0 4px;vertical-align:bottom;}
input.ans{width:100%;padding:9px 12px;background:var(--panel);
  border:1.5px solid var(--border2);border-radius:4px;font-family:var(--fb);
  font-size:.9rem;color:var(--ink);outline:none;min-height:42px;
  transition:border-color .2s;}
input.ans:focus{border-color:var(--blue);}

/* CLASSIFY */
.classify-bank{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;
  padding:12px;background:var(--panel2);border:1px dashed var(--border2);border-radius:5px;}
.mat-chip{padding:7px 13px;border:1.5px solid var(--border2);border-radius:4px;
  background:var(--panel);font-size:.82rem;font-weight:600;cursor:pointer;
  transition:all .18s;user-select:none;}
.mat-chip.sel{border-color:var(--blue);background:var(--blueL);color:var(--blue);}
.mat-chip.placed{opacity:.28;cursor:default;pointer-events:none;}
.classify-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:520px){.classify-cols{grid-template-columns:1fr;}}
.classify-col{background:var(--panel2);border:1.5px dashed var(--border2);
  border-radius:5px;padding:12px;min-height:90px;cursor:pointer;transition:all .18s;}
.col-c .col-t{color:var(--green);font-family:var(--fm);font-size:.6rem;
  text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700;}
.col-i .col-t{color:var(--red);font-family:var(--fm);font-size:.6rem;
  text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700;}
.col-c{border-color:rgba(21,128,61,.2);}
.col-i{border-color:rgba(185,28,28,.2);}
.placed-list{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;}
.pc{padding:4px 10px;border-radius:3px;font-size:.76rem;font-weight:600;cursor:pointer;}
.col-c .pc{background:var(--greenL);color:var(--green);border:1px solid rgba(21,128,61,.2);}
.col-i .pc{background:var(--redL);color:var(--red);border:1px solid rgba(185,28,28,.15);}

/* NUMBER CHOICE (anti-cheat MCQ for justification) */
.nc-row{background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  padding:13px 16px;margin-bottom:9px;}
.nc-q{font-size:.88rem;color:var(--ink);line-height:1.8;margin-bottom:10px;}
.nc-opts{display:flex;flex-wrap:wrap;gap:7px;}
.nc-btn{padding:8px 16px;border:1.5px solid var(--border2);border-radius:4px;
  background:var(--panel);font-family:var(--fm);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .18s;min-height:40px;}
.nc-btn:hover{border-color:var(--blue);}
.nc-btn.sel{background:var(--blueL);border-color:var(--blue);color:var(--blue);}

/* CIRCUIT */
canvas.cv-circ{display:block;width:100%;max-width:520px;margin:0 auto;
  border-radius:5px;background:#090d1a;border:1px solid var(--border2);margin-bottom:14px;}
.label-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.lf{display:flex;flex-direction:column;gap:4px;}
.ll{font-family:var(--fm);font-size:.57rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;}
input.li{padding:9px 12px;background:var(--panel);border:1.5px solid var(--border2);
  border-radius:4px;font-family:var(--fb);font-size:.88rem;color:var(--ink);
  outline:none;width:100%;min-height:42px;transition:border-color .2s;}
input.li:focus{border-color:var(--purple);}

/* OPEN TEXT */
textarea.open-ta{width:100%;padding:10px 12px;background:var(--panel);
  border:1.5px solid var(--border2);border-radius:4px;font-family:var(--fb);
  font-size:.88rem;color:var(--ink);outline:none;resize:vertical;
  min-height:80px;transition:border-color .2s;}
textarea.open-ta:focus{border-color:var(--amber);}

/* TRUE/FALSE */
.tf-row{background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  padding:13px 16px;margin-bottom:9px;}
.tf-stmt{font-size:.9rem;color:var(--ink);line-height:1.8;margin-bottom:10px;}
.tf-btns{display:flex;gap:8px;margin-bottom:9px;}
.tf-btn{flex:1;padding:9px;border:1.5px solid var(--border2);border-radius:4px;
  font-family:var(--fh);font-size:.78rem;letter-spacing:.5px;cursor:pointer;
  background:var(--panel);color:var(--muted);transition:all .18s;min-height:42px;}
.tf-btn.sel-t{background:var(--greenL);border-color:var(--green);color:var(--green);}
.tf-btn.sel-f{background:var(--redL);border-color:var(--red);color:var(--red);}
.tf-lbl{font-family:var(--fm);font-size:.57rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}

/* SPOT ERROR */
.err-stmt{background:var(--panel2);border:1.5px solid var(--border);
  border-radius:5px;padding:13px 16px;margin-bottom:12px;
  font-size:.9rem;line-height:1.85;color:var(--ink);}

/* PHOTO CHALLENGE */
.photo-challenge{background:linear-gradient(135deg,rgba(180,83,9,.06),rgba(124,58,237,.04));
  border:1.5px solid rgba(180,83,9,.2);border-radius:6px;padding:18px;}
.pc-steps{list-style:none;counter-reset:pcs;}
.pc-step{counter-increment:pcs;display:flex;gap:12px;margin-bottom:12px;font-size:.88rem;color:var(--muted);}
.pc-step::before{content:counter(pcs);min-width:24px;height:24px;border-radius:50%;
  background:var(--amber);color:#fff;font-family:var(--fh);font-size:.7rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.pc-step strong{color:var(--ink);}
.component-list{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.comp-tag{padding:6px 12px;background:var(--panel);border:1.5px solid var(--border2);
  border-radius:4px;font-size:.82rem;font-weight:600;}
input.url-inp{width:100%;padding:10px 12px;background:var(--panel);
  border:1.5px solid var(--border2);border-radius:4px;font-family:var(--fb);
  font-size:.88rem;color:var(--ink);outline:none;min-height:42px;
  transition:border-color .2s;}
input.url-inp:focus{border-color:var(--amber);}
textarea.desc-ta{width:100%;padding:10px 12px;background:var(--panel);
  border:1.5px solid var(--border2);border-radius:4px;font-family:var(--fb);
  font-size:.88rem;color:var(--ink);outline:none;resize:vertical;
  min-height:70px;transition:border-color .2s;margin-top:8px;}
textarea.desc-ta:focus{border-color:var(--amber);}

/* SUBMIT */
.submit-panel{background:var(--panel);border:1.5px solid var(--border);
  border-radius:6px;padding:20px;margin-bottom:14px;}
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));
  border-radius:3px;transition:width .4s;}
.prog-txt{font-family:var(--fm);font-size:.64rem;color:var(--muted2);margin-bottom:14px;}
.sub-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;
  border-radius:4px;font-family:var(--fh);font-size:1rem;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;}
.sub-btn:disabled{opacity:.4;cursor:not-allowed;}
.sub-ok{display:none;margin-top:12px;padding:12px;background:var(--greenL);
  border:1.5px solid var(--green);border-radius:4px;text-align:center;
  font-family:var(--fh);font-size:.9rem;color:var(--green);}

/* ABSENT */
.absent{display:none;min-height:80vh;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;text-align:center;padding:40px 20px;background:var(--ink);}
.absent h2{font-family:var(--fh);font-size:1.6rem;color:#fbbf24;}
.absent p{font-size:.88rem;color:rgba(255,255,255,.5);max-width:360px;line-height:1.75;}
.absent-code{font-family:var(--fm);font-size:.76rem;color:#fbbf24;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  padding:7px 18px;border-radius:3px;}

#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fbbf24;padding:9px 20px;border-radius:4px;
  font-family:var(--fm);font-size:.72rem;z-index:999;opacity:0;
  transition:opacity .3s;pointer-events:none;border:1px solid rgba(255,255,255,.1);}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ABSENT -->
<div class="absent" id="absentWrap">
  <h2>Absentee Version — F</h2>
  <p>Reserved for students who were absent. Ahmad shares this link individually.</p>
  <div class="absent-code">?v=F</div>
  <button onclick="startAbsent()" style="margin-top:12px;padding:11px 28px;
    background:#fbbf24;color:var(--ink);border:none;border-radius:4px;
    font-family:var(--fh);font-size:.9rem;cursor:pointer;">Begin Exam →</button>
</div>

<!-- HEADER -->
<div class="exam-header" id="examHeader">
  <div class="hdr-top">
    <div>
      <div class="school">Beit Jala Secondary · Physics · Grade 7</div>
      <div class="exam-name">Electricity Exam</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="ver-badge" id="verBadge">A</div>
      <div class="timer" id="timerDisp">30:00</div>
    </div>
  </div>
  <div class="hdr-meta">
    <span class="meta-item">Class: <strong>7D</strong></span>
    <span class="meta-item">Marks: <strong>20</strong></span>
    <span class="meta-item">Time: <strong>30 min</strong></span>
    <span class="meta-item" style="color:rgba(255,100,100,.7);">
      ⚠ Do not copy — every student has a different version</span>
  </div>
</div>

<!-- SELECTOR -->
<div class="selector" id="selectorWrap">
  <div class="sel-h">Select your name to receive your exam</div>
  <select id="stuName">
    <option value="">— Choose your name (Grade 7D) —</option>
  </select>
  <button class="start-btn" id="startBtn" disabled onclick="startExam()">
    Start My Exam →
  </button>
</div>

<!-- EXAM BODY -->
<div class="exam-body" id="examBody"></div>

<script>
'use strict';
const APPS='https://script.google.com/macros/s/AKfycbzTDERohf666RJoXbhx5hK7hTxaOQa63CDFeEKiVeSL8o4u7iBZ0uVyuiFKiMDwggmU/exec';

// ── STUDENTS ─────────────────────────────────────────────────
const STUDENTS=[
  'أحمد عمر حسين جعجع','أحمد محمد احمد ابو جاموس','ابراهيم سامي مروان حليحل',
  'ابراهيم يونس محمد رحال','احمد علي احمد المحمود','احمد فؤاد احمد جمعة',
  'اسيل احمد فريد العلي','ايلانا محمد ابراهيم الحلو','حلا فادي فايز معتوق',
  'حمزة عفيف علي السيد','داني محمد محمود حسين','رؤى حسن احمد محمد',
  'راما ابراهيم رشيد فارس','راما محمد علي الجعجع','زاهر محمد شحادة ديب',
  'سالي احمد وليد كريديه','سدرة المنتهى احمد حسون','عبد الرحمن درويش محمد سلام',
  'علي ابراهيم حسان الاشوح','علي مروان عدنان شحاده','علي وسيم علي مره',
  'عيسى احمد محمود الحصري','غيداء مالك جمعة بلال','فرح محمود كامل الخطيب',
  'ليمار هاني محمد جمعه','محمد مصطفى كمال الترك','محمد هاشم عادل المنسي',
  'محمد يوسف محمد محمد','مصطفى كمال علي سعد','منى وسام عمر سلام',
  'ندى علي احمد مطر','ولاء احمد فهد السعيد','يوسف علاء الدين كرزون',
  'يوسف علاء جهاد شحادة'
].sort((a,b)=>a.localeCompare(b,'ar'));

// ══════════════════════════════════════════════════════════════
// CIRCUIT LAYOUTS — single source of truth
// Each layout defines which component sits on each side of the circuit
// Number labels are assigned: 1=left, 2=top, 3=right, 4=bottom (always)
// This means circuit.correct is ALWAYS derived from LAYOUTS, never typed manually
// ══════════════════════════════════════════════════════════════
const LAYOUTS={
  A:{left:'battery', top:'switch',  right:'lamp',    bottom:'wire'},
  B:{left:'switch',  top:'battery', right:'wire',    bottom:'lamp'},
  C:{left:'wire',    top:'lamp',    right:'switch',  bottom:'battery'},
  D:{left:'lamp',    top:'wire',    right:'battery', bottom:'switch'},
  E:{left:'battery', top:'lamp',    right:'wire',    bottom:'switch'},
  F:{left:'battery', top:'switch',  right:'lamp',    bottom:'wire'},// different from A in other questions
};
// Number labels: 1=left, 2=top, 3=right, 4=bottom — consistent all versions
// So correct answer is always: LAYOUTS[v][side] where side = {1:left,2:top,3:right,4:bottom}
const NUM_TO_SIDE={1:'left',2:'top',3:'right',4:'bottom'};
const COMP_NAMES={
  battery:'Battery (dry cell)',
  lamp:'Lamp',
  switch:'Switch',
  wire:'Connecting wire',
};
function getCorrect(v){
  const L=LAYOUTS[v];
  return {1:COMP_NAMES[L.left],2:COMP_NAMES[L.top],3:COMP_NAMES[L.right],4:COMP_NAMES[L.bottom]};
}

// ══════════════════════════════════════════════════════════════
// EXAM VERSIONS — 5 + 1 absentee
// NO answer checking. All answers go to sheet for Ahmad to review.
// Sheet also shows correct answers side by side.
// ══════════════════════════════════════════════════════════════
const V={

A:{
  // Q1 — Fill in the blank × 4 (typed, no checking shown to student)
  blanks:[
    {s:'A <strong>dry cell</strong> is called a ___ because it produces electrical energy from chemical energy.',
     answer:'generator'},
    {s:'When a switch is <strong>open</strong>, the circuit is broken and exactly ___ current flows.',
     answer:'zero'},
    {s:'Copper wire is a ___ — it has free electrons that move and carry electrical charge through the circuit.',
     answer:'conductor'},
    {s:'A lamp is a <strong>receiver</strong> — it converts electrical energy into light energy and ___ energy.',
     answer:'heat'},
  ],
  // Q2 — Classify 6 materials (sorting, no checking)
  materials:['Iron nail','Glass rod','Copper coin','Dry wood','Steel spoon','Rubber band'],
  conductors:['Iron nail','Copper coin','Steel spoon'],
  insulators:['Glass rod','Dry wood','Rubber band'],
  // Q3 — Number-choice justification questions (choose from numbered options)
  nc:[
    {q:'A student closes the switch in a circuit. The lamp lights up. Why does closing the switch make the lamp light?',
     opts:['1 — Because the switch generates electricity when closed',
           '2 — Because closing the switch completes the path so current can flow',
           '3 — Because the lamp stores energy and releases it when the switch is pressed',
           '4 — Because the battery charges when the switch is closed'],
     answer:'2'},
    {q:'A student tests a glass marble in a circuit gap. The lamp does NOT light up. What does this tell us about glass?',
     opts:['1 — Glass is a conductor that needs more voltage',
           '2 — Glass is a generator — it needs to be connected differently',
           '3 — Glass is an insulator — it blocks current flow completely',
           '4 — Glass is a receiver — it uses the electricity itself'],
     answer:'3'},
    {q:'Why are connecting wires in a circuit made of copper rather than rubber?',
     opts:['1 — Rubber is too expensive',
           '2 — Copper is an insulator that controls the current safely',
           '3 — Copper is a conductor with free electrons that carry current easily',
           '4 — Rubber generates heat that would melt the circuit'],
     answer:'3'},
  ],
  // Q4 — True/False × 3 + justify with number choice (no free text for TF justification)
  tf:[
    {stmt:'An open switch creates a gap in the circuit, so current flows more slowly through the lamp.',
     correct:'false',
     nc_q:'Select the correct explanation:',
     nc_opts:['1 — Current slows because the gap adds resistance',
              '2 — Current drops to exactly zero because the path is completely broken',
              '3 — Current is reduced by half because the switch controls voltage',
              '4 — Current reverses direction when the switch opens'],
     nc_ans:'2'},
    {stmt:'A motor and a lamp are both receivers in a circuit.',
     correct:'true',
     nc_q:'Select the correct explanation:',
     nc_opts:['1 — Both produce electrical energy from other energy forms',
              '2 — Both control the flow of current in the circuit',
              '3 — Both receive electrical energy and convert it to other forms',
              '4 — Both are generators because they need electricity to work'],
     nc_ans:'3'},
    {stmt:'Adding more dry cells to a circuit increases the voltage and makes the lamp glow brighter.',
     correct:'true',
     nc_q:'Select the correct explanation:',
     nc_opts:['1 — More cells cool the circuit down making the lamp more efficient',
              '2 — More cells increase voltage which drives more current through the lamp',
              '3 — More cells slow the current but increase the light output',
              '4 — More cells increase resistance which brightens the lamp'],
     nc_ans:'2'},
  ],

(function(){
  const p=new URLSearchParams(window.location.search);
  if(p.get('v')==='F'){
    document.getElementById('absentWrap').style.display='flex';
    document.getElementById('selectorWrap').style.display='none';

  }

    document.getElementById('stuName').appendChild(o);
  });
  document.getElementById('stuName').addEventListener('change',function(){
    currentName=this.value;
    document.getElementById('startBtn').disabled=!this.value;
  });

function startAbsent(){
  document.getElementById('absentWrap').style.display='none';
  document.getElementById('selectorWrap').style.display='block';
}

function assignV(name){
  if(currentV==='F')return'F';
  let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;
  return['A','B','C','D','E'][h%5];
}

function startExam(){
  if(!currentName)return;
  if(!currentV)currentV=assignV(currentName);
  document.getElementById('selectorWrap').style.display='none';
  document.getElementById('examHeader').style.display='block';
  document.getElementById('verBadge').textContent='VERSION '+currentV;
  buildExam();
  document.getElementById('examBody').style.display='block';
  startTimer();
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(){
  renderTimer();
  timerI=setInterval(()=>{secondsLeft--;renderTimer();
    if(secondsLeft<=0){clearInterval(timerI);autoSub();}},1000);
}
function renderTimer(){
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  const el=document.getElementById('timerDisp');
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  if(secondsLeft<=300)el.className='timer warn';
  if(secondsLeft<=60)el.className='timer urgent';
}
function autoSub(){toast('Time is up — submitting…');setTimeout(()=>doSubmit(true),1500);}

function buildQ1(vd){
  const qb=mk('div','qb');qb.style.borderLeft='4px solid var(--blue)';
  qb.innerHTML=`<div class="q-hdr"><div class="q-dot" style="background:var(--blue)">1</div>
    <div class="q-meta">Fill in the Blank · 4 marks (1 each)</div></div>
    <p class="q-instruct">Complete each sentence. Write the missing word in the input box.<br>
    <strong>Your neighbour has different sentences — there is no benefit to copying.</strong></p>
    <div id="blanksWrap"></div>`;
  const wrap=qb.querySelector('#blanksWrap');
  vd.blanks.forEach((b,i)=>{
    const row=mk('div','blank-row');
    row.innerHTML=`<div class="blank-num">Sentence ${i+1}</div>

      <input class="ans" id="b_${i}" placeholder="Type the missing word…" autocomplete="off">`;
    wrap.appendChild(row);
  });
  return qb;
}

function selMaterial(name,chip){
  if(chip.classList.contains('placed'))return;
  if(selMat===name){selMat=null;chip.classList.remove('sel');return;}
  selMat=name;
  document.querySelectorAll('.mat-chip').forEach(c=>c.classList.remove('sel'));
  chip.classList.add('sel');toast('Tap a column to place');
}
function placeM(zone){
  if(!selMat)return;
  ['c','i'].forEach(z=>{
    const idx=classifyState[z].indexOf(selMat);
    if(idx>-1){
      classifyState[z].splice(idx,1);
      const ch=document.getElementById('mc_'+selMat.replace(/\s/g,'_'));
      if(ch){ch.classList.remove('placed');ch.style.display='';}
    }
  });
  classifyState[zone].push(selMat);
  const ch=document.getElementById('mc_'+selMat.replace(/\s/g,'_'));
  if(ch){ch.classList.add('placed');ch.style.display='none';}
  selMat=null;
  document.querySelectorAll('.mat-chip').forEach(c=>c.classList.remove('sel'));
  renderLists();updateProg();
}
function renderLists(){
  ['c','i'].forEach(z=>{
    const el=document.getElementById('list'+(z==='c'?'C':'I'));
    el.innerHTML=classifyState[z].map(n=>`
      <span class="pc" onclick="retMat('${n}','${z}')" title="Tap to return">${n}</span>`).join('');
  });
}
function retMat(name,zone){
  classifyState[zone]=classifyState[zone].filter(n=>n!==name);
  const ch=document.getElementById('mc_'+name.replace(/\s/g,'_'));
  if(ch){ch.classList.remove('placed');ch.style.display='';}
  renderLists();
}

// ── CIRCUIT DRAWING ─────────────────────────────────────────────
function drawCircuit(layout){
  const cv=document.getElementById('cvCirc');if(!cv)return;
  const W=Math.min(cv.offsetParent?.clientWidth||520,520);
  cv.width=W;cv.height=240;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#090d1a';ctx.fillRect(0,0,W,cv.height);
  // Grid
  ctx.fillStyle='rgba(96,160,255,.06)';
  for(let x=16;x<W;x+=24)for(let y=14;y<cv.height;y+=24){
    ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();}

  const L=LAYOUTS[layout];
  const mx=44,my=28;const rx=W-mx,ry=cv.height-my;
  const cx=W/2,cy=cv.height/2;
  const gap=28;

  // Wires — leave gaps at component positions
  ctx.strokeStyle='rgba(96,165,250,.6)';ctx.lineWidth=2.5;ctx.lineCap='round';
  // Top wire
  wl(ctx,mx,my,cx-gap,my);wl(ctx,cx+gap,my,rx,my);
  // Bottom wire
  wl(ctx,mx,ry,cx-gap,ry);wl(ctx,cx+gap,ry,rx,ry);
  // Left wire
  wl(ctx,mx,my,mx,cy-gap);wl(ctx,mx,cy+gap,mx,ry);
  // Right wire
  wl(ctx,rx,my,rx,cy-gap);wl(ctx,rx,cy+gap,rx,ry);

  // Draw each component at its position
  // orientation: 'h' = on horizontal wire (top/bottom), 'v' = on vertical wire (left/right)
  drawComp(ctx,L.top,   cx,my,'h');
  drawComp(ctx,L.bottom,cx,ry,'h');
  drawComp(ctx,L.left,  mx,cy,'v');
  drawComp(ctx,L.right, rx,cy,'v');

  // Number labels — fixed: 1=left, 2=top, 3=right, 4=bottom
  const numPos=[
    {n:1,x:mx, y:cy, ox:-24,oy:0},
    {n:2,x:cx, y:my, ox:0,  oy:-24},
    {n:3,x:rx, y:cy, ox:24, oy:0},
    {n:4,x:cx, y:ry, ox:0,  oy:24},
  ];
  numPos.forEach(({n,x,y,ox,oy})=>{
    const lx=x+ox,ly=y+oy;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(lx,ly,11,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(lx,ly,11,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#000';ctx.font='bold 11px DM Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n,lx,ly);ctx.textBaseline='alphabetic';
  });
}

function wl(ctx,x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

function drawComp(ctx,type,x,y,ori){
  // ori: 'h'=horizontal wire (top/bottom), 'v'=vertical wire (left/right)
  ctx.save();
  switch(type){

    case'lamp':
      ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
      ctx.fillStyle='rgba(251,191,36,.18)';
      ctx.beginPath();ctx.arc(x,y,14,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-9,y-9);ctx.lineTo(x+9,y+9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+9,y-9);ctx.lineTo(x-9,y+9);ctx.stroke();
      break;

    case'switch':
      ctx.strokeStyle='#a78bfa';ctx.lineWidth=2.2;ctx.lineCap='round';
      if(ori==='h'){
        // Horizontal wire: lever opens upward
        wl(ctx,x-20,y,x-7,y);wl(ctx,x+7,y,x+20,y);
        wl(ctx,x-7,y,x+5,y-15);// lever
        ctx.fillStyle='#a78bfa';
        [[x-7,y],[x+7,y]].forEach(([px,py])=>{
          ctx.beginPath();ctx.arc(px,py,3.2,0,Math.PI*2);ctx.fill();});
      } else {
        // Vertical wire: lever opens to the right
        wl(ctx,x,y-20,x,y-7);wl(ctx,x,y+7,x,y+20);
        wl(ctx,x,y-7,x+15,y+5);// lever opens right
        ctx.fillStyle='#a78bfa';
        [[x,y-7],[x,y+7]].forEach(([px,py])=>{
          ctx.beginPath();ctx.arc(px,py,3.2,0,Math.PI*2);ctx.fill();});
      }
      break;

    case'battery':
      // Lines always perpendicular to the wire they sit on
      ctx.strokeStyle='#34d399';ctx.lineWidth=2.5;ctx.lineCap='square';
      if(ori==='h'){
        // On horizontal wire → draw VERTICAL lines (perpendicular)
        // Long line positive (+), short line negative (−), stacked horizontally
        [{len:20,offset:-13},{len:12,offset:-3},{len:20,offset:7},{len:12,offset:17}]
          .forEach(({len,offset})=>{
            ctx.beginPath();
            ctx.moveTo(x+offset, y-len/2);
            ctx.lineTo(x+offset, y+len/2);
            ctx.stroke();
          });
        // + and − labels
        ctx.fillStyle='#34d399';ctx.font='bold 8px DM Mono';ctx.textAlign='center';
        ctx.fillText('+',x-13,y-14);ctx.fillText('\u2212',x-3,y-14);
      } else {
        // On vertical wire → draw HORIZONTAL lines (perpendicular)
        [{len:20,offset:-13},{len:12,offset:-3},{len:20,offset:7},{len:12,offset:17}]
          .forEach(({len,offset})=>{
            ctx.beginPath();
            ctx.moveTo(x-len/2, y+offset);
            ctx.lineTo(x+len/2, y+offset);
            ctx.stroke();
          });
        ctx.fillStyle='#34d399';ctx.font='bold 8px DM Mono';ctx.textAlign='left';
        ctx.fillText('+',x+13,y-12);ctx.fillText('\u2212',x+13,y-2);
      }
      break;

    case'wire':
      ctx.strokeStyle='rgba(96,165,250,.95)';ctx.lineWidth=4;
      if(ori==='h'){
        ctx.beginPath();ctx.moveTo(x-22,y);ctx.lineTo(x+22,y);ctx.stroke();
        ctx.fillStyle='rgba(96,165,250,.8)';
        [[x-22,y],[x+22,y]].forEach(([px,py])=>{
          ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fill();});
      } else {
        ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x,y+22);ctx.stroke();
        ctx.fillStyle='rgba(96,165,250,.8)';
        [[x,y-22],[x,y+22]].forEach(([px,py])=>{
          ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fill();});
      }
      break;
  }
  ctx.restore();
}

// ── SUBMIT ─────────────────────────────────────────────────────
async function doSubmit(auto=false){
  clearInterval(timerI);
  const btn=document.querySelector('.sub-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Submitting…';}
  const vd=V[currentV];
  const correct=getCorrect(currentV);
  const timeUsed=Math.floor((30*60-secondsLeft)/60)+'m '+((30*60-secondsLeft)%60)+'s';

  // Q1 blanks
  const blankRows=vd.blanks.map((b,i)=>{
    const stu=document.getElementById('b_'+i)?.value.trim()||'—';
    return `S${i+1}: "${stu}" | Correct: "${b.answer}"`;
  }).join(' || ');

  // Q2 classify
  const classCond=classifyState.c.join(', ')||'—';
  const classIns=classifyState.i.join(', ')||'—';
  const condReason=document.getElementById('condReason')?.value||'—';
  const insReason=document.getElementById('insReason')?.value||'—';
  const classCorrectC=vd.conductors.join(', ');
  const classCorrectI=vd.insulators.join(', ');

  // Q3 number-choice
  const ncAns=vd.nc.map((item,i)=>{
    const stu=ncPicks['q3_'+i]||'—';
    return `Q3.${i+1}: chose "${stu}" | Correct: "${item.answer}"`;
  }).join(' || ');

  // Q4 T/F
  const tfAns=vd.tf.map((item,i)=>{
    const stuTF=tfPicks[i]||'—';
    const stuNC=ncPicks['tf_'+i]||'—';
    return `S${i+1}: TF="${stuTF}"(correct:${item.correct}) Exp="${stuNC}"(correct:${item.nc_ans})`;
  }).join(' || ');

  // Q5 circuit
  const circAns=[1,2,3,4].map(n=>{
    const stu=document.getElementById('cl_'+n)?.value.trim()||'—';
    return `${n}:"${stu}"(correct:"${correct[n]}")`;
  }).join(' | ');

  const payload={
    sheet:'Electricity_Exam_G7',
    name:currentName,class:'7D',version:currentV,
    time_used:timeUsed,auto_submit:auto?'Yes':'No',
    q1_blanks:blankRows,
    q2_classify:`C:[${classCond}] vs Correct:[${classCorrectC}] | I:[${classIns}] vs Correct:[${classCorrectI}]`,
    q2_cond_reason:condReason,q2_ins_reason:insReason,
    q3_nc:ncAns,
    q4_tf:tfAns,
    q5_circuit:circAns,
    q6_open:document.getElementById('openAns')?.value||'—',
    q7_error_spot:document.getElementById('errSpot')?.value||'—',
    q7_error_fix:document.getElementById('errFix')?.value||'—',
    q8_photo_link:document.getElementById('photoLink')?.value||'—',
    q8_photo_desc:document.getElementById('photoDesc')?.value||'—',
  };
  try{
    await fetch(APPS,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)});
    document.getElementById('subOk').style.display='block';
    if(btn){btn.textContent='✓ Submitted';btn.style.background='var(--green)';}
    toast('✓ Submitted. Ahmad will review in class.');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='📤 Submit Exam to Ahmad';}
    toast('⚠ Connection error — try again');
  }
}

function mk(tag,cls){const d=document.createElement(tag);if(cls)d.className=cls;return d;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

window.addEventListener('resize',()=>{
  if(currentV)drawCircuit(V[currentV].circuit_layout);},{passive:true});
</script>
