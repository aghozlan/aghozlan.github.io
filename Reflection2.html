<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8: Reflection of Light Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .neon-border { box-shadow: 0 0 10px rgba(16, 185, 129, 0.5), inset 0 0 10px rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.5); }
        .neon-text-blue { text-shadow: 0 0 10px rgba(56, 189, 248, 0.8); }
        canvas { touch-action: none; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; cursor: pointer; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-12">

    <!-- Header -->
    <header class="w-full bg-zinc-900 border-b border-zinc-800 shadow-2xl sticky top-0 z-50">
        <div class="h-1 w-full bg-gradient-to-r from-blue-500 via-emerald-500 to-rose-500"></div>
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black text-white">Interactive Physics <span class="text-emerald-400">Lab</span></h1>
            <div id="studentBadge" class="hidden glass-panel px-4 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span id="displayStudentName" class="text-sm font-bold text-emerald-300"></span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-4 mt-8 space-y-12">
        <!-- STAGE 1: LOGIN -->
        <section id="stage-login" class="glass-panel p-8 rounded-3xl max-w-lg mx-auto">
            <h2 class="text-2xl font-black text-white mb-6 text-center">Lab Login</h2>
            <div class="space-y-5">
                <select id="sectionSelect" onchange="loadStudents()" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white">
                    <option value="" disabled selected>Select Section...</option>
                    <option value="8A">Class 8A</option>
                    <option value="8B">Class 8B</option>
                    <option value="8C">Class 8C</option>
                    <option value="8D">Class 8D</option>
                </select>
                <select id="studentSelect" dir="rtl" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white" disabled>
                    <option value="" disabled selected>Select a section first...</option>
                </select>
                <button onclick="startLab()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl">Enter Laboratory 🚀</button>
            </div>
        </section>

        <!-- STAGE 2: LAB CONTENT -->
        <div id="stage-lab" class="hidden space-y-12">
            <canvas id="rayCanvas" width="800" height="400" class="w-full bg-black rounded-2xl border border-zinc-700"></canvas>
            <canvas id="mirrorCanvas" width="800" height="300" class="w-full bg-zinc-950 rounded-2xl border border-zinc-700"></canvas>
            
            <div class="glass-panel p-6 rounded-3xl">
                <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleImageUpload(event)">
                <label for="cameraInput" class="custom-file-upload block w-full p-8 border-2 border-dashed border-indigo-500/50 rounded-2xl text-center">Take Photo of Drawing</label>
            </div>

            <div id="quizContainer" class="space-y-4"></div>
            <button onclick="submitFinalWork()" class="w-full bg-emerald-500 py-4 rounded-xl font-black">Submit Answers and Drawing 📤</button>
        </div>

        <!-- STAGE 3: SUCCESS -->
        <section id="stage-success" class="hidden glass-panel p-10 rounded-3xl text-center">
            <h2 class="text-3xl font-black text-white">Great job, Champion!</h2>
            <p id="finalScoreText" class="text-emerald-400 mt-4"></p>
        </section>
    </main>

    <script>
        const rosters = { /* ... Your JSON ... */ };
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwG9rHNO5aMCJYKRzsBtEVWvdljheXCHhxwpsRuImOUarbEexYTNfkaq_OZ1g_U9qPdtA/exec";
        let currentUser = { section: "", name: "" };
        let uploadedBase64Image = null;
        let selectedAnswers = {};
        const questions = [
            { id: 1, text: "Angle between incident ray and normal is called:", options: ["Reflection", "Incidence", "Critical"], answer: 1 },
            { id: 2, text: "If angle of incidence is 30°, reflection is:", options: ["60°", "15°", "30°"], answer: 2 },
            { id: 3, text: "Image in plane mirror is:", options: ["Real", "Virtual", "Large"], answer: 1 },
            { id: 4, text: "Distance from mirror (2m) vs image distance:", options: ["2m", "4m", "1m"], answer: 0 },
            { id: 5, text: "Normal line angle with mirror:", options: ["0°", "45°", "90°"], answer: 2 }
        ];

        function loadStudents() {
            const sec = document.getElementById('sectionSelect').value;
            const stuSelect = document.getElementById('studentSelect');
            stuSelect.innerHTML = '<option value="" disabled selected>Select your name...</option>';
            rosters[sec]?.forEach(name => stuSelect.innerHTML += `<option value="${name}">${name}</option>`);
            stuSelect.disabled = false;
        }

        function startLab() {
            currentUser = { section: document.getElementById('sectionSelect').value, name: document.getElementById('studentSelect').value };
            document.getElementById('stage-login').style.display = 'none';
            document.getElementById('stage-lab').classList.remove('hidden');
            initQuiz();
        }

        function initQuiz() {
            const container = document.getElementById('quizContainer');
            questions.forEach(q => {
                let html = `<div class="p-4 bg-zinc-900 rounded-xl"> <p>${q.text}</p>`;
                q.options.forEach((opt, idx) => {
                    html += `<label class="block"><input type="radio" name="q${q.id}" onchange="selectedAnswers[${q.id}] = ${idx}"> ${opt}</label>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function handleImageUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => { uploadedBase64Image = event.target.result; alert("Image captured!"); };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function submitFinalWork() {
            if (!uploadedBase64Image || Object.keys(selectedAnswers).length < questions.length) return alert("Complete all sections!");

            const payload = { ...currentUser, score: 0, imageBase64: uploadedBase64Image };
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Added to prevent preflight errors
                    body: JSON.stringify(payload)
                });
                document.getElementById('stage-lab').classList.add('hidden');
                document.getElementById('stage-success').classList.remove('hidden');
            } catch (err) { alert("Submission failed."); }
        }
    </script>
</body>
</html>
